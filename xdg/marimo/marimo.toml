[display]
default_table_page_size = 10
theme = "system"
reference_highlighting = true
default_table_max_columns = 50
default_width = "full"
cell_output = "above"
code_editor_font_size = 14
dataframes = "rich"

[diagnostics]

[ai]
rules = ""
mode = "manual"

[ai.anthropic]

[ai.github]
api_key = ""

[ai.google]

[ai.models]
custom_models = []
chat_model = "anthropic/claude-sonnet-4-20250514"
edit_model = "ollama/kimi-k2.5:cloud"
displayed_models = []

[ai.open_ai]

[keymap]
preset = "vim"
destructive_delete = true

[keymap.overrides]

[language_servers.basedpyright]

[language_servers.ty]

[language_servers.pylsp]
enable_mypy = true
enable_pylint = false
enabled = true
enable_pyflakes = false
enable_flake8 = false
enable_ruff = true
enable_pydocstyle = false

[completion]
activate_on_typing = true
copilot = "github"

[save]
format_on_save = false
autosave_delay = 1000
autosave = "after_delay"

[runtime]
std_stream_max_bytes = 1000000
auto_instantiate = false
auto_reload = "lazy"
reactive_tests = true
output_max_bytes = 8000000
default_auto_download = []
watcher_on_save = "lazy"
default_sql_output = "auto"
on_cell_change = "lazy"

[server]
browser = "default"
follow_symlink = false

[formatting]
line_length = 79

[package_management]
manager = "uv"

[snippets]
include_default_snippets = true
custom_paths = []

[experimental]
