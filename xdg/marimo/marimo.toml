[display]
code_editor_font_size = 14
default_width = "full"
default_table_page_size = 10
dataframes = "rich"
reference_highlighting = true
cell_output = "above"
theme = "system"
default_table_max_columns = 50

[package_management]
manager = "uv"

[formatting]
line_length = 79

[completion]
activate_on_typing = true
copilot = "github"

[snippets]
custom_paths = []
include_default_snippets = true

[diagnostics]

[ai]
rules = ""
mode = "manual"

[ai.anthropic]

[ai.custom_providers.xai]
api_key = ""
base_url = "https://api.x.ai/v1/"

[ai.github]
api_key = ""

[ai.open_ai]

[ai.models]
displayed_models = []
custom_models = ["xai/grok-code-fast-1"]
edit_model = "ollama/kimi-k2.5:cloud"
chat_model = "ollama/kimi-k2.5:cloud"

[ai.google]

[server]
follow_symlink = false
browser = "default"

[keymap]
preset = "vim"
destructive_delete = true

[keymap.overrides]

[experimental]

[runtime]
on_cell_change = "lazy"
default_auto_download = []
reactive_tests = true
default_sql_output = "auto"
auto_instantiate = false
std_stream_max_bytes = 1000000
auto_reload = "lazy"
output_max_bytes = 8000000
watcher_on_save = "lazy"

[save]
autosave = "after_delay"
format_on_save = true
autosave_delay = 1000

[language_servers.basedpyright]

[language_servers.ty]

[language_servers.pylsp]
enable_flake8 = false
enable_ruff = true
enabled = true
enable_pylint = false
enable_mypy = true
enable_pydocstyle = false
enable_pyflakes = false
